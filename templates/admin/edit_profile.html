
<!-- admin/templates/admin/edit_profile.html -->
{% extends 'admin/base.html' %}
{% block title %}Edit Profile - Admin Panel{% endblock %}
{% block content %}
<div class="header">
    <h1>Edit Profile</h1>
    <p>Update your profile information</p>
</div>

<div class="section">
    <div class="form-container">
        <form method="POST" class="profile-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" class="form-input">
            </div>

            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" class="form-input">
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" required class="form-input">
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" value="{{ user.username }}" disabled class="form-input" style="background: #f5f5f5; cursor: not-allowed;">
                <small style="color: #666;">Username cannot be changed</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{% url 'admin_panel:admin_profile' %}" class="btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-container {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        padding: 2rem;
        border-radius: 8px;
        border: 1px solid #eee;
    }

    .profile-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #333;
    }

    .form-input {
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
        transition: border-color 0.3s;
    }

    .form-input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
    }

    .btn-primary, .btn-secondary {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 1rem;
        font-weight: 500;
        transition: background 0.3s;
    }

    .btn-primary {
        background: #667eea;
        color: white;
        flex: 1;
    }

    .btn-primary:hover {
        background: #5568d3;
    }

    .btn-secondary {
        background: #e0e0e0;
        color: #333;
        flex: 1;
    }

    .btn-secondary:hover {
        background: #d0d0d0;
    }

    @media (max-width: 600px) {
        .form-container {
            padding: 1.5rem;
        }

        .form-actions {
            flex-direction: column;
        }
    }
</style>
{% endblock %}
